<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="header">
    <div class="header-left">
      <span class="logo">&#9670; Life Dashboard</span>
    </div>
    <div class="header-right">
      <button id="themeToggle" class="btn-icon" title="Toggle theme" aria-label="Toggle light/dark mode">
        <span id="themeIcon">&#9790;</span>
      </button>
    </div>
  </header>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="dashboard">

    <!-- ROW 1: Greeting + Clock -->
    <section class="card greeting-card" aria-label="Greeting and clock">
      <div class="greeting-block">
        <p id="greeting" class="greeting-text">Good Morning</p>
        <h1 id="userName" class="user-name">Friend</h1>
        <div class="name-edit-row">
          <input
            type="text"
            id="nameInput"
            class="name-input"
            placeholder="Enter your name…"
            maxlength="30"
            aria-label="Your name"
          />
          <button id="saveNameBtn" class="btn btn-primary btn-sm">Save</button>
        </div>
      </div>
      <div class="clock-block">
        <div id="clock" class="clock">00:00:00</div>
        <div id="dateDisplay" class="date-display">Loading…</div>
      </div>
    </section>

    <!-- ROW 2: Pomodoro + To-Do -->
    <div class="row-two">

      <!-- POMODORO TIMER -->
      <section class="card pomodoro-card" aria-label="Focus timer">
        <h2 class="card-title">&#9201; Focus Timer</h2>
        <div id="timerDisplay" class="timer-display">25:00</div>
        <p id="timerLabel" class="timer-label">Pomodoro Session</p>
        <div class="timer-controls">
          <button id="startBtn" class="btn btn-primary">Start</button>
          <button id="stopBtn"  class="btn btn-secondary" disabled>Stop</button>
          <button id="resetBtn" class="btn btn-ghost">Reset</button>
        </div>
        <div class="timer-presets">
          <span class="preset-label">Presets:</span>
          <button class="btn btn-preset active" data-minutes="25">25 min</button>
          <button class="btn btn-preset" data-minutes="15">15 min</button>
          <button class="btn btn-preset" data-minutes="5">5 min</button>
        </div>
      </section>

      <!-- TO-DO LIST -->
      <section class="card todo-card" aria-label="To-do list">
        <h2 class="card-title">&#10003; To-Do List</h2>
        <div class="todo-input-row">
          <input
            type="text"
            id="taskInput"
            class="text-input"
            placeholder="Add a new task…"
            maxlength="120"
            aria-label="New task"
          />
          <button id="addTaskBtn" class="btn btn-primary">Add</button>
        </div>
        <p id="duplicateMsg" class="duplicate-msg" aria-live="polite"></p>
        <div class="todo-filters">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="active">Active</button>
          <button class="filter-btn" data-filter="completed">Done</button>
        </div>
        <ul id="taskList" class="task-list" aria-label="Task list"></ul>
        <div class="todo-footer">
          <span id="taskCount" class="task-count">0 tasks left</span>
          <button id="clearCompletedBtn" class="btn btn-ghost btn-sm">Clear done</button>
        </div>
      </section>

    </div><!-- end row-two -->

    <!-- ROW 3: Quick Links -->
    <section class="card links-card" aria-label="Quick links">
      <h2 class="card-title">&#128279; Quick Links</h2>
      <div class="links-input-row">
        <input
          type="text"
          id="linkNameInput"
          class="text-input"
          placeholder="Label (e.g. GitHub)"
          maxlength="30"
          aria-label="Link label"
        />
        <input
          type="url"
          id="linkUrlInput"
          class="text-input"
          placeholder="URL (e.g. https://github.com)"
          aria-label="Link URL"
        />
        <button id="addLinkBtn" class="btn btn-primary">Add</button>
      </div>
      <p id="linkError" class="duplicate-msg" aria-live="polite"></p>
      <div id="linkGrid" class="link-grid"></div>
    </section>

  </main>

  <!-- EDIT TASK MODAL -->
  <div id="editModal" class="modal-overlay" role="dialog" aria-modal="true" aria-label="Edit task" hidden>
    <div class="modal">
      <h3 class="modal-title">Edit Task</h3>
      <input
        type="text"
        id="editTaskInput"
        class="text-input"
        maxlength="120"
        aria-label="Edit task text"
      />
      <p id="editDuplicateMsg" class="duplicate-msg" aria-live="polite"></p>
      <div class="modal-actions">
        <button id="saveEditBtn" class="btn btn-primary">Save</button>
        <button id="cancelEditBtn" class="btn btn-ghost">Cancel</button>
      </div>
    </div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
